<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار كيمياء تحصيلي تجريبي</title>
    <style>
        :root { --bg: #f8fafc; --panel: #ffffff; --light-blue: #e0f2fe; --primary: #0284c7; --success: #16a34a; --danger: #dc2626; --accent: #0369a1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        .container { max-width: 1000px; margin: 20px auto; background: var(--panel); border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        
        .header-brand { 
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); 
            padding: 25px; 
            text-align: center;
            color: white;
            font-weight: bold;
        }
        .header-brand h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .header-brand p { margin: 5px 0 0; font-size: 16px; opacity: 0.9; }

        .welcome-screen { padding: 50px 20px; text-align: center; }
        .welcome-screen h2 { color: #0f172a; margin-bottom: 10px; }
        .welcome-screen p { color: #64748b; margin-bottom: 30px; font-size: 18px; }
        
        input[type="text"] { width: 65%; padding: 16px; border: 2px solid #cbd5e1; border-radius: 15px; font-size: 18px; text-align: center; outline: none; margin-bottom: 20px; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--light-blue); }

        .quiz-screen { display: none; padding: 30px; }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 15px; font-weight: bold; background: #f1f5f9; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }

        .q-card { background: #fff; padding: 10px; border-radius: 15px; margin-bottom: 25px; }
        .q-text { font-size: 22px; font-weight: bold; color: #0f172a; line-height: 1.6; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 768px) { .options-grid { grid-template-columns: 1fr; } }
        
        .option { padding: 18px; background: #fff; border: 2px solid #e2e8f0; border-radius: 15px; cursor: pointer; transition: 0.2s; font-size: 18px; text-align: right; position: relative; }
        .option:hover { border-color: var(--primary); background: #f0f9ff; transform: scale(1.01); }
        .correct { background: var(--success) !important; color: white; border-color: var(--success) !important; }
        .wrong { background: var(--danger) !important; color: white; border-color: var(--danger) !important; }

        .feedback-box { margin-top: 25px; padding: 20px; border-radius: 15px; display: none; border: 2px solid; text-align: center; font-weight: bold; font-size: 18px; }
        .fb-success { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
        .fb-danger { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 16px 50px; border-radius: 15px; cursor: pointer; font-size: 19px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn:hover { background: var(--accent); transform: translateY(-2px); }
        #next-btn { background: #334155; display: none; margin-top: 20px; }

        #result-screen { display:none; padding: 30px; }
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 14px; min-width: 600px; }
        .summary-table th, .summary-table td { padding: 12px; border: 1px solid #e2e8f0; text-align: right; }
        .summary-table th { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-brand">
        <h1>اختبار كيمياء تحصيلي تجريبي</h1>
        <p>القسم الأول: مقدمة في علم الكيمياء</p>
    </div>

    <div id="start-screen" class="welcome-screen">
        <h2>مرحباً بك أيها المبدع/ة 💡</h2>
        <p>اختبار شامل في (القسم الأول) يحتوي على 49 سؤالاً من أهم معايير الكيمياء للتحصيلي</p>
        <input type="text" id="student-name" placeholder="فضلاً، أدخل اسمك الثلاثي للبدء">
        <br>
        <button class="btn" onclick="startQuiz()">بدء الاختبار 🚀</button>
    </div>

    <div id="quiz-screen" class="quiz-screen">
        <div class="stats-bar">
            <span>👤 المختبر: <span id="display-name" style="color:var(--primary)"></span></span>
            <span>📝 السؤال: <span id="q-counter"></span></span>
        </div>
        <div class="q-card">
            <div class="q-text" id="q-text"></div>
        </div>
        <div class="options-grid" id="options-container"></div>
        <div id="feedback-box" class="feedback-box">
            <span id="fb-title"></span>
        </div>
        <div style="text-align: center;">
            <button id="next-btn" class="btn" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-screen">
        <div style="text-align:center;">
            <h2 id="res-title"></h2>
            <div id="res-score" style="font-size: 38px; font-weight: 900; color: var(--primary); margin: 20px;"></div>
            <p id="res-eval" style="font-size: 18px; color: #64748b;"></p>
        </div>
        <hr style="border:0; border-top:1px solid #e2e8f0; margin: 30px 0;">
        <h3>📊 مراجعة الأداء:</h3>
        <div style="overflow-x:auto;">
            <table class="summary-table">
                <thead>
                    <tr><th>#</th><th>السؤال</th><th>إجابتك</th><th>الإجابة الصحيحة</th><th>النتيجة</th></tr>
                </thead>
                <tbody id="summary-body"></tbody>
            </table>
        </div>
        <div style="text-align:center; margin-top:40px;">
            <button class="btn" onclick="location.reload()">محاولة مرة أخرى 🔄</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        { "text": "فرع الكيمياء الذي يقوم بدراسة المركبات التي تحتوي على الكربون؟", "options": {"أ": "التحليلية", "ب": "العضوية", "ج": "الحيوية", "د": "الذرية"}, "answer": "ب" },
        { "text": "أحد فروع علم الكيمياء الذي يستقصي تحلل مواد التغليف في البيئة:", "options": {"أ": "الحيوية", "ب": "البيئية", "ج": "العضوية", "د": "الفيزيائية"}, "answer": "ب" },
        { "text": "فرع الكيمياء الذي يهتم بدراسة النظائر والروابط والتركيب الإلكتروني:", "options": {"أ": "الحيوية", "ب": "الذرية", "ج": "التحليلية", "د": "العضوية"}, "answer": "ب" },
        { "text": "فرع من فروع الكيمياء يدرس المواد وتفاعلاتها وخصائصها:", "options": {"أ": "الذرية", "ب": "الفيزيائية", "ج": "الحيوية", "د": "النووية"}, "answer": "ب" },
        { "text": "فرع الكيمياء الذي يقوم بدراسة التلوث:", "options": {"أ": "التحليلية", "ب": "العضوية", "ج": "البيئية", "د": "الذرية"}, "answer": "ج" },
        { "text": "دراسة الروابط وأشكال المدارات والتركيب الإلكتروني تتبع فرع الكيمياء:", "options": {"أ": "التحليلية", "ب": "الذرية", "ج": "الحيوية", "د": "العضوية"}, "answer": "ب" },
        { "text": "غاز الأوزون O3 يوجد في الهواء ضمن طبقة تسمى:", "options": {"أ": "الستراتوسفير", "ب": "الميزوسفير", "ج": "التروبوسفير", "د": "الثيرموسفير"}, "answer": "أ" },
        { "text": "عدد جزيئات الأوزون الناتجة عن 6 ذرات أكسجين:", "options": {"أ": "2", "ب": "1", "ج": "4", "د": "3"}, "answer": "أ" },
        { "text": "عدد جزيئات الأوزون الناتجة عن 12 ذرة أكسجين:", "options": {"أ": "3", "ب": "2", "ج": "4", "د": "6"}, "answer": "ج" },
        { "text": "تمكن من قياس كمية الأوزون:", "options": {"أ": "رذرفورد", "ب": "كروكس", "ج": "دوبسون", "د": "مليكان"}, "answer": "ج" },
        { "text": "تمكن العالم دوبسون من قياس المعدل الطبيعي لكمية الأوزون وهي:", "options": {"أ": "150 DU", "ب": "300 DU", "ج": "400 DU", "د": "600 DU"}, "answer": "ب" },
        { "text": "الأشعة الضارة التي تمتصها طبقة الأوزون هي:", "options": {"أ": "السينية", "ب": "فوق البنفسجية", "ج": "تحت الحمراء", "د": "المرئية"}, "answer": "ب" },
        { "text": "ما سبب التناقص في طبقة الأوزون في الهواء الجوي؟", "options": {"أ": "CFCs", "ب": "الأكسجين", "ج": "الأشعة UV", "د": "CO2"}, "answer": "أ" },
        { "text": "الكلوروفلوروكربون مكون من؟", "options": {"أ": "Cl-F-O", "ب": "Cl-F-C", "ج": "Cl-F-Ca", "د": "Cl-F-Cr"}, "answer": "ب" },
        { "text": "أي التالي يمثل مقياساً لكمية المادة فقط؟", "options": {"أ": "الحجم", "ب": "الكتلة", "ج": "الكثافة", "د": "الوزن"}, "answer": "ب" },
        { "text": "أي الآتي يُعد مادة؟", "options": {"أ": "الضوء", "ب": "الصوت", "ج": "الحرارة", "د": "الهواء"}, "answer": "د" },
        { "text": "أي الآتي لا يُعد مادة؟", "options": {"أ": "الضوء", "ب": "الهواء", "ج": "الورق", "د": "التراب"}, "answer": "أ" },
        { "text": "أي الآتي لا يصنف مادة حسب التعريف العلمي؟", "options": {"أ": "الماء", "ب": "الهواء", "ج": "الحرارة", "د": "التراب"}, "answer": "ج" },
        { "text": "أي الخيارات التالية تعتبر مادة؟", "options": {"أ": "الضوء", "ب": "الموجات", "ج": "الحرارة", "د": "الدخان"}, "answer": "د" },
        { "text": "أي الخطوات الآتية نبدأ بها الدراسة العلمية؟", "options": {"أ": "الفرضية", "ب": "الملاحظة", "ج": "الاستنتاج", "د": "النشر"}, "answer": "ب" },
        { "text": "أولى خطوات الطريقة العلمية:", "options": {"أ": "الفرضية", "ب": "التجربة", "ج": "طرح الأسئلة", "د": "الاستنتاج"}, "answer": "ج" },
        { "text": "تفسير قابل للاختبار:", "options": {"أ": "الفرضية", "ب": "النظرية", "ج": "القانون", "د": "المبدأ"}, "answer": "أ" },
        { "text": "يقوم العالم بصياغة فرضية عندما يلاحظ ظاهرة جديدة، لماذا؟", "options": {"أ": "ليفسرها", "ب": "ليستنتج", "ج": "ليحلل", "د": "ليختبر"}, "answer": "أ" },
        { "text": "لكي نثبت الفرضية نحتاج إلى:", "options": {"أ": "التجريب", "ب": "الملاحظة", "ج": "التحليل", "د": "الاستنتاج"}, "answer": "أ" },
        { "text": "مجموعة من المشاهدات المختبرة التي تصف ظاهرة طبيعية:", "options": {"أ": "الفرضية", "ب": "الاستنتاج", "ج": "القانون العلمي", "د": "النظرية"}, "answer": "ج" },
        { "text": "تفسير لظاهرة طبيعية بناءً على مشاهدات واستقصاءات مع مرور الزمن:", "options": {"أ": "الفرضية", "ب": "القانون", "ج": "النظرية", "د": "الاستنتاج"}, "answer": "ج" },
        { "text": "بحث يهدف لحل مشكلة محددة:", "options": {"أ": "بحث نظري", "ب": "بحث تطبيقي", "ج": "تجربة", "د": "قانون"}, "answer": "ب" },
        { "text": "دراسة مركبات CFCs وتفاعلها مع الأوزون بدون دليل بيئي تعتبر:", "options": {"أ": "بحث نظري", "ب": "بحث تطبيقي", "ج": "قانون", "د": "فرضية"}, "answer": "أ" },
        { "text": "من أمثلة البحث التطبيقي:", "options": {"أ": "دراسة خواص الغاز", "ب": "البحث عن علاج للسرطان", "ج": "قياس الكتلة", "د": "ملاحظة لون مادة"}, "answer": "ب" },
        { "text": "الحالة التي لها شكل وحجم محدد:", "options": {"أ": "الصلبة", "ب": "السائلة", "ج": "الغازية", "د": "البلازما"}, "answer": "أ" },
        { "text": "جسيمات المادة التي تتحرك بحرية وتأخذ شكل وحجم الوعاء:", "options": {"أ": "الصلبة", "ب": "السائلة", "ج": "الغازية", "د": "البلازما"}, "answer": "ج" },
        { "text": "مادة جزيئاتها متلاصقة بقوة:", "options": {"أ": "السائلة", "ب": "الصلبة", "ج": "الغازية", "د": "البلازما"}, "answer": "ب" },
        { "text": "القدرة على القيام بشغل أو إنتاج حرارة:", "options": {"أ": "المادة", "ب": "الطاقة", "ج": "الكثافة", "د": "القوة"}, "answer": "ب" },
        { "text": "أي التالي يعتبر خاصية فيزيائية؟", "options": {"أ": "الصدأ", "ب": "الاحتراق", "ج": "توصيل النحاس للكهرباء", "د": "فقدان الفضة لبريقها"}, "answer": "ج" },
        { "text": "أي التالي خاصية كيميائية؟", "options": {"أ": "الغليان", "ب": "الانصهار", "ج": "صدأ الحديد", "د": "الكثافة"}, "answer": "ج" },
        { "text": "الصفة الكمية لورقة الإجابة التي بين يديك:", "options": {"أ": "اللون", "ب": "الملمس", "ج": "المقاس", "د": "الرائحة"}, "answer": "ج" },
        { "text": "أي الخواص التالية تعتبر خاصية نوعية (غير مميزة)؟", "options": {"أ": "الكتلة", "ب": "اللون", "ج": "الطعم", "د": "الرائحة"}, "answer": "أ" },
        { "text": "كثافة المادة تعتبر خاصية:", "options": {"أ": "فيزيائية مميزة", "ب": "كيميائية", "ج": "فيزيائية غير مميزة", "د": "كمية"}, "answer": "أ" },
        { "text": "تغير في المادة لا يؤدي إلى تغيير تركيبها الكيميائي:", "options": {"أ": "التغير الكيميائي", "ب": "التغير الفيزيائي", "ج": "الصدأ", "د": "الاحتراق"}, "answer": "ب" },
        { "text": "تكسير لوح زجاجي يعتبر تغيراً:", "options": {"أ": "كيميائياً", "ب": "فيزيائياً", "ج": "حيوياً", "د": "نووياً"}, "answer": "ب" },
        { "text": "أي الخيارات التالية يعتبر تغيراً كيميائياً؟", "options": {"أ": "انصهار الجليد", "ب": "غليان الماء", "ج": "احتراق الخشب", "د": "كسر الزجاج"}, "answer": "ج" },
        { "text": "تحلل المادة وتغير تركيبها يعرف بـ:", "options": {"أ": "التغير الفيزيائي", "ب": "التغير الكيميائي", "ج": "الانصهار", "د": "التسامي"}, "answer": "ب" },
        { "text": "من الأدلة على حدوث تفاعل كيميائي:", "options": {"أ": "تغير الحالة", "ب": "تغير الحجم", "ج": "تصاعد غاز", "د": "التكسير"}, "answer": "ج" },
        { "text": "مادة كيميائية نقية لا يمكن تجزئتها إلى أجزاء أصغر بطرق فيزيائية أو كيميائية:", "options": {"أ": "المركب", "ب": "المخلوط", "ج": "العنصر", "د": "المحلول"}, "answer": "ج" },
        { "text": "اتحاد عنصرين أو أكثر بنسب ثابتة:", "options": {"أ": "المخلوط", "ب": "المركب", "ج": "العنصر", "د": "المادة"}, "answer": "ب" },
        { "text": "يعد ملح الطعام NaCl:", "options": {"أ": "عنصراً", "ب": "مخلوطاً متجانساً", "ج": "مركباً", "د": "مخلوطاً غير متجانس"}, "answer": "ج" },
        { "text": "العالم الذي أثبت وجود الإلكترونات باستخدام أنبوب الأشعة المهبطية:", "options": {"أ": "دالتون", "ب": "طومسون", "ج": "رذرفورد", "د": "بور"}, "answer": "ب" },
        { "text": "العالم الذي اكتشف النواة من خلال تجربة صفيحة الذهب:", "options": {"أ": "طومسون", "ب": "رذرفورد", "ج": "شادويك", "د": "دالتون"}, "answer": "ب" },
        { "text": "العالم الذي اكتشف النيوترون هو:", "options": {"أ": "رذرفورد", "ب": "شادويك", "ج": "طومسون", "د": "بور"}, "answer": "ب" }
    ];

    let currentIdx = 0; let score = 0; let log = [];

    function startQuiz() {
        const name = document.getElementById('student-name').value;
        if(!name.trim()) return alert("لطفاً، أدخل اسمك قبل البدء.");
        document.getElementById('display-name').innerText = name;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        if(currentIdx >= questions.length) return finishQuiz();
        document.getElementById('q-counter').innerText = `${currentIdx + 1} / ${questions.length}`;
        const feedback = document.getElementById('feedback-box');
        feedback.style.display = 'none';
        feedback.className = 'feedback-box';
        document.getElementById('next-btn').style.display = 'none';
        
        const qData = questions[currentIdx];
        document.getElementById('q-text').innerText = qData.text;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        Object.entries(qData.options).forEach(([key, val]) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = `${key}) ${val}`;
            btn.onclick = () => handleAnswer(key);
            container.appendChild(btn);
        });
    }

    function handleAnswer(selectedKey) {
        const qData = questions[currentIdx];
        const options = document.querySelectorAll('.option');
        const isCorrect = selectedKey === qData.answer;

        if(isCorrect) score++;
        log.push({
            q: qData.text,
            user: selectedKey + ") " + qData.options[selectedKey],
            correct: qData.answer + ") " + qData.options[qData.answer],
            status: isCorrect
        });

        options.forEach(opt => {
            opt.style.pointerEvents = 'none';
            const optKey = opt.innerText.split(')')[0];
            if(optKey === qData.answer) opt.classList.add('correct');
            else if(optKey === selectedKey) opt.classList.add('wrong');
        });

        const fb = document.getElementById('feedback-box');
        fb.classList.add(isCorrect ? 'fb-success' : 'fb-danger');
        document.getElementById('fb-title').innerText = isCorrect ? "إجابة صحيحة ✅" : "إجابة غير صحيحة ❌";
        fb.style.display = 'block';
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIdx++;
        showQuestion();
    }

    function finishQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-title').innerText = `تقرير المختبر: ${document.getElementById('student-name').value}`;
        document.getElementById('res-score').innerText = `درجتك: ${score} من ${questions.length}`;
        
        const perc = (score / questions.length) * 100;
        let eval = perc >= 90 ? "ممتاز جداً! أنت مستعد للتحصيلي بجدارة 🌟" : perc >= 75 ? "جيد جداً، لديك أساس قوي ✨" : "تحتاج للمزيد من المذاكرة 📚";
        document.getElementById('res-eval').innerText = eval;

        const body = document.getElementById('summary-body');
        log.forEach((item, i) => {
            body.innerHTML += `<tr><td>${i+1}</td><td>${item.q}</td><td style="color:${item.status?'#16a34a':'#dc2626'}; font-weight:bold;">${item.user}</td><td style="color:#16a34a; font-weight:bold;">${item.correct}</td><td>${item.status?'✅':'❌'}</td></tr>`;
        });
    }
</script>
</body>
</html>
